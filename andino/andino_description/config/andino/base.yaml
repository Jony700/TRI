base:
  mass: 0.8               # Base mass in Kg
  radius: 0.1             # Base radius in m (round robot)
  x_size: 0.2             # = 2*radius, used for wheel positioning
  y_size: 0.2             # = 2*radius, used for wheel positioning
  z_size: 0.05            # Base height in m
  mesh: ''                # Leave empty to use cylinder primitive
